name: Secure DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

jobs:
  # --- SAST (CodeQL) ---
  sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v4
        with :
          output: codeql-results
      - name: Locate SARIF files
        run: find . -name "*.sarif" || true
      - name: Show SARIF results in logs
        run: cat $(find . -name "*.sarif" | head -n 1) || true
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: cat $(find . -name "*.sarif" | head -n 1) || true

  # --- SCA (Dependency Scanning) ---
  sca:
    runs-on: ubuntu-latest
    needs: sast
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: npm audit --json > npm-audit.json || true
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install safety
          safety check --json > safety.json || true
      - name: Upload SCA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            npm-audit.json
            safety.json

  # --- API Testing (Newman/Postman) ---
  api_test:
    runs-on: ubuntu-latest
    needs: sca
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Install Newman
        run: npm install -g newman
      - name: Run API tests
        run: newman run tests/postman_collection.json --reporters cli,json --reporter-json-export api-test-results.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api-test-results.json

  # --- Secret Detection (TruffleHog) ---
  secrets_scan:
    runs-on: ubuntu-latest
    needs: api_test
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Install TruffleHog
        run: pip install trufflehog
      - name: Run TruffleHog
        run: trufflehog filesystem --json . > trufflehog-results.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: secrets-results
          path: trufflehog-results.json

  # --- Artifact Integrity Validation ---
  integrity_check:
    runs-on: ubuntu-latest
    needs: [sca, api_test, secrets_scan]
    if: always()
    steps:
      - name: Generate checksums
        run: |
          sha256sum npm-audit.json > checksums.txt || true
          sha256sum safety.json >> checksums.txt || true
          sha256sum api-test-results.json >> checksums.txt || true
          sha256sum trufflehog-results.json >> checksums.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: integrity-checksums
          path: checksums.txt

  # --- Reporting (Convert SARIF to HTML) ---
  # --- Reporting (Convert SARIF to HTML) ---
  reports:
    runs-on: ubuntu-latest
    needs: integrity_check
    if: always()
    steps:
    - name: Locate SARIF files
      run: find . -name "*.sarif"
    - name: Install SARIF Multitool
      run: npm install -g @microsoft/sarif-multitool
    - name: Convert SARIF to HTML
      run: sarif-multitool transform ./codeql-results/javascript.sarif --format HTML --output codeql-report.html || true
    - name: Upload CodeQL HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codeql-report
        path: codeql-report.html
